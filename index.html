<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qualité de l'air - AtmoSud</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #ffffff;
    overflow: hidden;
  }
  /*
    Le widget complet (indice + conseils) est plus haut que large.
    On lui donne sa taille reelle, puis on l'agrandit avec "scale"
    pour qu'il remplisse l'ecran sans rien couper.

    REGLAGES A AJUSTER selon votre ecran :
    - --largeur  : largeur reelle du widget (laisser 480 pour commencer)
    - --hauteur  : hauteur reelle du widget COMPLET avec les conseils
                   (1100 est une bonne base ; augmentez si le bas est coupe,
                    diminuez s'il reste trop de vide en bas)
    - scale      : le zoom. Plus grand = plus gros. Reglez en dernier.
  */
  .scaler {
    --largeur: 480px;
    --hauteur: 1100px;

    width: var(--largeur);
    height: var(--hauteur);

    /* centre le widget a l'ecran */
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    transform-origin: center center;
  }
  .scaler iframe {
    width: 100%;
    height: 100%;
    border: 0;
  }
</style>
</head>
<body>
  <div class="scaler">
    <iframe src="https://www.atmosud.org/widget-mon-air/widget/commune/13087"></iframe>
  </div>
</body>
</html>
