<title>Qualité de l'air - Rousset</title>
<style>
  :root{
    --fond1:#0a2540;--fond2:#0e3155;
    --txt:#fff;--txt-doux:#aac4dd;
    --carte:rgba(255,255,255,0.05);--bord:rgba(255,255,255,0.10);
    --bleu:#4db8ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;font-family:"Segoe UI",Tahoma,sans-serif;
    background:radial-gradient(circle at 25% 15%,var(--fond2),var(--fond1));
    color:var(--txt);overflow:hidden;}
  .page{width:100%;height:100%;display:flex;flex-direction:column;padding:2.3vh 2.8vw;}
  header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1.2vh;}
  h1{font-size:2.2vw;font-weight:700;letter-spacing:-1px;}
  h1 span{color:var(--bleu);}
  .lieu{font-size:1vw;color:var(--txt-doux);margin-top:0.3vh;}
  .maj{font-size:0.88vw;color:var(--txt-doux);text-align:right;}
  .meteo-tag{font-size:0.95vw;color:#fff;margin-top:0.4vh;}

  .corps{flex:1;display:flex;gap:2.3vw;align-items:center;min-height:0;}

  .jauge-bloc{flex:0 0 30%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .jauge{position:relative;width:21vw;}
  .jauge svg{width:100%;height:auto;display:block;}
  .jauge-qualif{font-size:1.8vw;font-weight:800;line-height:1;margin-top:0.7vh;text-align:center;}
  .jauge-sous{font-size:0.88vw;color:var(--txt-doux);margin-top:0.5vh;text-align:center;}
  .tendance{margin-top:1.2vh;font-size:0.92vw;color:var(--txt-doux);text-align:center;}
  .tendance b{color:#fff;}

  .course{margin-top:1.6vh;width:92%;border-radius:12px;padding:1.2vh 1vw;
    display:flex;align-items:center;gap:0.9vw;
    border-left:6px solid var(--cc,#888);background:rgba(255,255,255,0.05);}
  .course-ico{position:relative;flex:0 0 auto;width:3vw;height:3vw;}
  .course-ico img{width:100%;height:100%;object-fit:contain;filter:brightness(0) invert(1);}
  .course-badge{position:absolute;right:-0.4vw;bottom:-0.4vw;
    width:1.6vw;height:1.6vw;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:1vw;font-weight:900;color:#06121f;background:var(--cc,#888);
    border:2px solid var(--fond1);}
  .course-txt{font-size:1vw;font-weight:700;color:var(--cc,#fff);}
  .course-det{font-size:0.72vw;color:var(--txt-doux);margin-top:0.2vh;line-height:1.3;}

  .droite{flex:1;display:flex;flex-direction:column;gap:2.2vh;min-height:0;justify-content:center;}
  .sous-titre{font-size:1vw;font-weight:600;color:var(--txt-doux);margin-bottom:0.3vh;}

  /* Bulletin en haut */
  .bulletin{background:var(--carte);border:1px solid var(--bord);border-radius:10px;
    padding:1vh 1.1vw;font-size:0.74vw;line-height:1.45;color:#cfe0ee;}

  .polluants{display:grid;grid-template-columns:repeat(5,1fr);gap:0.7vw;}
  .pol{background:var(--carte);border:1px solid var(--bord);border-radius:10px;
    padding:0.8vh 0.3vw;text-align:center;border-top:4px solid var(--c,#888);}
  .pol-nom{font-size:0.88vw;font-weight:700;}
  .pol-qual{font-size:0.68vw;color:var(--txt-doux);margin-top:0.3vh;}
  .pol-oms{font-size:0.56vw;color:#7d97b3;margin-top:0.4vh;line-height:1.2;}

  .prev{display:flex;gap:0.9vw;}
  .prev-jour{flex:1;background:var(--carte);border:1px solid var(--bord);
    border-radius:9px;padding:0.7vh 0.7vw;display:flex;align-items:center;gap:0.6vw;}
  .prev-pastille{width:1.2vw;height:1.2vw;border-radius:50%;flex:0 0 auto;}
  .prev-info{font-size:0.78vw;}
  .prev-info .d{color:var(--txt-doux);font-size:0.66vw;}

  /* Conseils : 2 colonnes, icone fine blanche + badge transparent */
  .conseils{display:grid;grid-template-columns:repeat(2,1fr);gap:0.6vh 1.4vw;}
  .conseil{display:flex;gap:0.9vw;align-items:flex-start;}
  .conseil-ico{position:relative;flex:0 0 auto;width:2.2vw;height:2.2vw;}
  .conseil-ico svg{width:100%;height:100%;stroke:#fff;fill:none;stroke-width:1.6;
    stroke-linecap:round;stroke-linejoin:round;}
  /* badge transparent superpose */
  .conseil-badge{position:absolute;right:-0.3vw;bottom:-0.3vw;
    width:1.3vw;height:1.3vw;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:0.85vw;font-weight:900;}
  .badge-ok{background:rgba(80,240,230,0.25);color:#9af7ef;border:1px solid rgba(80,240,230,0.5);}
  .badge-warn{background:rgba(240,230,65,0.25);color:#f5ec8a;border:1px solid rgba(240,230,65,0.5);}
  .conseil-txt h4{font-size:0.82vw;color:var(--bleu);font-weight:700;margin-bottom:0.1vh;}
  .conseil-txt p{font-size:0.7vw;line-height:1.3;color:#cfe0ee;}

  footer{margin-top:1.1vh;display:flex;justify-content:space-between;align-items:center;}
  .legende{display:flex;gap:0.5vw;flex-wrap:wrap;}
  .leg{display:flex;align-items:center;gap:0.35vw;font-size:0.7vw;color:var(--txt-doux);}
  .leg-c{width:0.78vw;height:0.78vw;border-radius:3px;}
  .source{font-size:0.7vw;color:var(--txt-doux);}
  .chargement{font-size:1vw;color:var(--txt-doux);padding:3vh;}
  .erreur{font-size:1vw;color:#ff9b9b;padding:3vh;}
</style>
</head>

  function choixDuJour(liste, decalage){
    const j=Math.floor(Date.now()/86400000)+(decalage||0);
    return liste[j % liste.length];
  }

  function verdictCourse(niveau, temp, pluie, vent){
    const h = new Date().getHours();
    const mois = new Date().getMonth()+1;
    const ete = (mois>=5 && mois<=9);
    let probleme=[]; let gravite=0;

    if(niveau>=4){gravite=2;probleme.push("air mauvais");}
    else if(niveau===3){gravite=Math.max(gravite,1);probleme.push("air dégradé");}
    if(temp>=33){gravite=2;probleme.push("forte chaleur ("+Math.round(temp)+"°C)");}
    else if(temp>=29){gravite=Math.max(gravite,1);probleme.push("chaleur ("+Math.round(temp)+"°C)");}
    else if(temp<=2){gravite=Math.max(gravite,1);probleme.push("froid ("+Math.round(temp)+"°C)");}
    if(pluie>=3){gravite=Math.max(gravite,1);probleme.push("pluie");}
    if(vent>=40){gravite=Math.max(gravite,1);probleme.push("vent fort");}

    // Suggestion de creneau selon l'heure et la chaleur
    let creneau="";
    if(temp>=27 && ete){
      if(h>=11 && h<18) creneau=" Plutôt en fin de journée (après 18h), quand il fait moins chaud et qu'il y a moins d'ozone.";
      else if(h<11) creneau=" Bon créneau le matin avant la chaleur.";
      else creneau=" Bon créneau en soirée, à la fraîche.";
    } else if(temp<=2){
      creneau=" Privilégiez le milieu de journée, le plus doux.";
    }

    if(gravite===0){
      return {ok:true, txt:"Idéal pour courir",
        det:"Air de bonne qualité, météo favorable ("+Math.round(temp)+"°C)."+creneau,
        couleur:"#50F0E6"};
    } else if(gravite===1){
      return {ok:false, txt:"Course possible avec prudence",
        det:"À surveiller : "+probleme.join(", ")+"."+creneau,
        couleur:"#F0E641"};
    } else {
      return {ok:false, txt:"Course déconseillée",
        det:"Conditions défavorables : "+probleme.join(", ")+". Préférez l'intérieur."+creneau,
        couleur:"#FF5050"};
    }
  }

  // chaque conseil renvoie aussi "ok" (true=check transparent, false=exclamation transparent)
  function conseils(niveau, temp, pluie, vent, majoritaire){
    const mois=new Date().getMonth()+1;
    const ete=(mois>=5&&mois<=9), hiver=(mois<=3||mois>=11);
    const dom=(majoritaire&&majoritaire[0])?majoritaire[0].toLowerCase():"";
    const ozone=dom.includes("o3"), particules=dom.includes("pm");
    const airOk = niveau<=2;

    let activite, actOk;
    if(niveau>=4){activite=choixDuJour(["Reportez le sport intense en extérieur ; préférez une activité douce ou en intérieur.","Évitez les efforts prolongés dehors aujourd'hui.","Privilégiez une activité calme et limitez le temps passé dehors."]);actOk=false;}
    else if(ozone&&ete){activite=choixDuJour(["Pic d'ozone l'après-midi : faites votre sport tôt le matin ou en soirée, à l'ombre.","Évitez l'effort intense entre 12h et 18h, quand l'ozone est au plus haut."]);actOk=false;}
    else if(niveau===3){activite=choixDuJour(["Privilégiez les parcs, les zones piétonnes et les rues peu circulantes pour vos activités de plein air.","Faites du sport loin du trafic : parcs, chemins, bords de rivière."]);actOk=false;}
    else {activite=choixDuJour(["Conditions favorables : profitez des parcs et espaces verts pour vos activités de plein air.","Bon moment pour bouger dehors : marche, course ou vélo dans les zones vertes.","Air de bonne qualité : idéal pour une sortie sportive en plein air."]);actOk=true;}

    let sensibles, sensOk;
    if(niveau>=4){sensibles=choixDuJour(["Personnes sensibles : limitez les sorties et consultez un professionnel en cas de gêne.","Personnes sensibles : réduisez les efforts et restez attentif aux symptômes (toux, essoufflement).","En cas de gêne respiratoire ou cardiaque, prendre conseil auprès d'un professionnel de santé.","Enfants, personnes âgées, femmes enceintes, asthmatiques, diabétiques et insuffisants cardiaques : redoublez de prudence aujourd'hui."]);sensOk=false;}
    else if(particules&&hiver){sensibles="Particules fines élevées : évitez les abords des routes et le chauffage au bois.";sensOk=false;}
    else if(niveau>=3){sensibles=choixDuJour(["N'aggravez pas les effets de la pollution en ajoutant des facteurs irritants (tabac, solvants, fumée de cheminée, pollens, etc.).","Personnes sensibles : surveillez votre respiration et évitez les zones de fort trafic.","En cas de gêne respiratoire ou cardiaque, prendre conseil auprès d'un professionnel de santé.","Asthmatiques, diabétiques, personnes âgées ou cardiaques : limitez les efforts intenses en extérieur."]);sensOk=false;}
    else {sensibles=choixDuJour(["Aucune précaution particulière, mais évitez les facteurs irritants (tabac, fumée, solvants).","Conditions favorables, y compris pour les personnes sensibles.","En cas de gêne respiratoire ou cardiaque inhabituelle, n'hésitez pas à consulter un professionnel de santé."]);sensOk=true;}

    let deplacements;
    if(niveau>=3) deplacements=choixDuJour([
      "Privilégiez les transports en commun, le covoiturage ou le vélo.",
      "À vélo, placez-vous devant les voitures au feu rouge et gardez vos distances derrière un véhicule motorisé.",
      "Optez pour le covoiturage : moins de voitures, moins de pollution pour tous.",
      "Reportez si possible les trajets non essentiels en voiture aujourd'hui.",
      "À pied, empruntez les voies piétonnes ou les rues moins encombrées par le trafic."
    ], niveau);
    else deplacements=choixDuJour([
      "Pour les trajets courts, préférez la marche ou le vélo.",
      "À vélo, placez-vous devant les voitures au feu rouge et gardez vos distances derrière un véhicule motorisé.",
      "À pied, empruntez les voies piétonnes ou les rues moins encombrées par le trafic.",
      "Pensez au covoiturage pour vos trajets domicile-travail.",
      "Combinez vos déplacements pour limiter les trajets en voiture."
    ], niveau);

    let airint, airOk2;
    if(pluie>=3){airint="La pluie assainit l'air extérieur : c'est le moment d'aérer largement.";airOk2=true;}
    else if(niveau>=4){airint=choixDuJour([
      "Aérez brièvement aux heures les moins polluées (tôt le matin).",
      "Limitez l'aération aux moments où l'air extérieur est le moins chargé."
    ]);airOk2=false;}
    else airint=choixDuJour([
      "Aérez 10 à 15 minutes, deux fois par jour.",
      "L'aération et la ventilation sont les moyens les plus efficaces d'améliorer votre air intérieur.",
      "Ouvrez les fenêtres matin et soir : l'air intérieur est souvent plus pollué que l'extérieur.",
      "Ne bloquez pas les grilles de ventilation : elles renouvellent l'air en continu.",
      "Aérez après le ménage, la cuisine ou la douche pour évacuer l'humidité et les polluants."
    ]),airOk2=true;

    let pool=[
      "Utilisez des produits ménagers labellisés (Ecocert, NF Environnement, Ecolabel) et sans symbole de danger.",
      "Choisissez peintures, colles et meubles étiquetés A+ pour limiter les polluants intérieurs.",
      "Limitez bougies parfumées et encens, sources de particules fines à l'intérieur."
    ];
    if(ete&&ozone) pool=pool.concat(["Ozone : limitez la voiture aux heures chaudes.","Faites le plein de carburant le soir : moins d'évaporation, moins d'ozone.","Tondez la pelouse en soirée plutôt qu'en pleine chaleur."]);
    if(hiver&&particules) pool=pool.concat(["Chauffage au bois : appareil performant (Flamme Verte) et bois bien sec.","Pas de brûlage de déchets verts : interdit et très émetteur de particules.","Chauffage à 19°C : bon pour l'air, la santé et la facture."]);
    if(temp>=32) pool=pool.concat(["Forte chaleur : hydratez-vous, restez au frais, fermez les volets le jour.","Canicule et ozone vont souvent ensemble : efforts à la fraîche."]);
    if(temp<=3) pool=pool.concat(["Grand froid : ne faites pas tourner le moteur à l'arrêt.","Limitez les feux de cheminée d'agrément, très émetteurs de particules."]);
    // Conseils valables toute l'année
    pool=pool.concat(["Privilégiez le covoiturage ou les transports en commun pour le travail.","Préservez la végétation : elle capte une partie des polluants."]);
    // Conseil entretien adapté à la saison
    if(ete) pool=pool.concat(["Entretenez et nettoyez les filtres de votre climatisation pour un air sain.","Réglez la climatisation à 26°C : suffisant pour le confort, sobre en énergie."]);
    else if(hiver) pool=pool.concat(["Entretenez régulièrement votre chaudière et vos appareils de combustion.","Faites ramoner votre cheminée : un conduit propre pollue moins."]);
    else pool=pool.concat(["Entretenez vos systèmes de chauffage et de ventilation pour un air intérieur sain."]);
    const conseilJour=choixDuJour(pool, niveau);

    return [
      {ico:ICONES.activite,t:"Activité physique",p:activite,ok:actOk},
      {ico:ICONES.sensibles,t:"Personnes sensibles",p:sensibles,ok:sensOk},
      {ico:ICONES.deplacements,t:"Déplacements",p:deplacements,ok:true},
      {ico:ICONES.airint,t:"Air intérieur",p:airint,ok:airOk2},
      {ico:ICONES.conseil,t:"Conseil du jour",p:conseilJour,ok:true}
    ];
  }

  function jour(s){const d=new Date(s+"T12:00:00");
    return d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"});}
  function troisDates(){const o=[];for(let i=0;i<3;i++){const d=new Date();
    d.setDate(d.getDate()+i);o.push(d.toISOString().slice(0,10));}return o.join(",");}

  function demiJauge(niveau){
    const cx=100,cy=100,r=80;let segs="";
    for(let i=0;i<6;i++){
      const a0=180-i*30,a1=180-(i+1)*30;
      const r0=a0*Math.PI/180,r1=a1*Math.PI/180;
      const x0=cx+r*Math.cos(r0),y0=cy-r*Math.sin(r0);
      const x1=cx+r*Math.cos(r1),y1=cy-r*Math.sin(r1);
      segs+=`<path d="M ${x0} ${y0} A ${r} ${r} 0 0 1 ${x1} ${y1}" fill="none" stroke="${ECHELLE[i].c}" stroke-width="18"/>`;
    }
    const angle=180-(niveau-0.5)*30, rad=angle*Math.PI/180;
    const ax=cx+(r-8)*Math.cos(rad), ay=cy-(r-8)*Math.sin(rad);
    return `<svg viewBox="0 0 200 118">${segs}
      <line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="7" fill="#fff"/></svg>`;
  }

  async function getMeteo(){
    try{
      const u="https://api.open-meteo.com/v1/forecast?latitude="+LAT+"&longitude="+LON
        +"&current=temperature_2m,precipitation,wind_speed_10m&timezone=Europe%2FParis";
      const r=await fetch(u);const d=await r.json();
      return {temp:d.current.temperature_2m,pluie:d.current.precipitation,vent:d.current.wind_speed_10m};
    }catch(e){return {temp:20,pluie:0,vent:0};}
  }
  async function getBulletin(){
    try{
      const today=troisDates().split(",")[0];
      const r=await fetch("https://api.atmosud.org/prevision/commentaires/?dates_echeance="+today+"&token="+TOKEN);
      const d=await r.json();if(d&&d[today]) return d[today];
    }catch(e){}
    return "";
  }
