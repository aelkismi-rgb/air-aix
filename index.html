<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qualité de l'air - Rousset</title>
<style>
  :root{
    --fond1:#0a2540;--fond2:#0e3155;
    --txt:#fff;--txt-doux:#aac4dd;
    --carte:rgba(255,255,255,0.05);--bord:rgba(255,255,255,0.10);
    --bleu:#4db8ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;font-family:"Segoe UI",Tahoma,sans-serif;
    background:radial-gradient(circle at 25% 15%,var(--fond2),var(--fond1));
    color:var(--txt);overflow:hidden;}
  .page{width:100%;height:100%;display:flex;flex-direction:column;padding:2.3vh 2.8vw;}
  header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:1.2vh;}
  h1{font-size:2.2vw;font-weight:700;letter-spacing:-1px;}
  h1 span{color:var(--bleu);}
  .lieu{font-size:1vw;color:var(--txt-doux);margin-top:0.3vh;}
  .maj{font-size:0.88vw;color:var(--txt-doux);text-align:right;}
  .meteo-tag{font-size:0.95vw;color:#fff;margin-top:0.4vh;}

  .corps{flex:1;display:flex;gap:2.3vw;align-items:center;min-height:0;}

  /* Demi-jauge a aiguille */
  .jauge-bloc{flex:0 0 30%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .jauge{position:relative;width:21vw;}
  .jauge svg{width:100%;height:auto;display:block;}
  .jauge-qualif{font-size:1.8vw;font-weight:800;line-height:1;margin-top:0.7vh;text-align:center;}
  .jauge-sous{font-size:0.88vw;color:var(--txt-doux);margin-top:0.5vh;text-align:center;}
  .tendance{margin-top:1.2vh;font-size:0.92vw;color:var(--txt-doux);text-align:center;}
  .tendance b{color:#fff;}

  /* Verdict course : code couleur + icone simple */
  .course{margin-top:1.6vh;width:92%;border-radius:12px;padding:1.2vh 1vw;
    display:flex;align-items:center;gap:0.9vw;
    border-left:6px solid var(--cc,#888);background:rgba(255,255,255,0.05);}
  .course-ico{flex:0 0 auto;width:2.6vw;height:2.6vw;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    background:var(--cc,#888);color:#06121f;font-size:1.6vw;font-weight:900;}
  .course-txt{font-size:1vw;font-weight:700;color:var(--cc,#fff);}
  .course-det{font-size:0.72vw;color:var(--txt-doux);margin-top:0.2vh;line-height:1.3;}

  /* Colonne droite */
  .droite{flex:1;display:flex;flex-direction:column;gap:1.1vh;min-height:0;}
  .sous-titre{font-size:1vw;font-weight:600;color:var(--txt-doux);margin-bottom:0.3vh;}
  .polluants{display:grid;grid-template-columns:repeat(5,1fr);gap:0.7vw;}
  .pol{background:var(--carte);border:1px solid var(--bord);border-radius:10px;
    padding:0.8vh 0.3vw;text-align:center;border-top:4px solid var(--c,#888);}
  .pol-nom{font-size:0.88vw;font-weight:700;}
  .pol-qual{font-size:0.68vw;color:var(--txt-doux);margin-top:0.3vh;}
  .pol-oms{font-size:0.56vw;color:#7d97b3;margin-top:0.4vh;line-height:1.2;}

  .prev{display:flex;gap:0.9vw;}
  .prev-jour{flex:1;background:var(--carte);border:1px solid var(--bord);
    border-radius:9px;padding:0.7vh 0.7vw;display:flex;align-items:center;gap:0.6vw;}
  .prev-pastille{width:1.2vw;height:1.2vw;border-radius:50%;flex:0 0 auto;}
  .prev-info{font-size:0.78vw;}
  .prev-info .d{color:var(--txt-doux);font-size:0.66vw;}

  /* Conseils EPURES facon AtmoSud : icone + texte, pas de cadre */
  .conseils{display:flex;flex-direction:column;gap:0.7vh;}
  .conseil{display:flex;gap:0.9vw;align-items:flex-start;}
  .conseil-ico{font-size:1.3vw;line-height:1.2;flex:0 0 auto;width:1.8vw;text-align:center;}
  .conseil-txt h4{font-size:0.82vw;color:var(--bleu);font-weight:700;margin-bottom:0.1vh;}
  .conseil-txt p{font-size:0.7vw;line-height:1.3;color:#cfe0ee;}

  /* Bulletin */
  .bulletin{background:var(--carte);border:1px solid var(--bord);border-radius:10px;
    padding:1vh 1vw;font-size:0.72vw;line-height:1.4;color:#cfe0ee;
    max-height:11vh;overflow-y:auto;}

  footer{margin-top:1.1vh;display:flex;justify-content:space-between;align-items:center;}
  .legende{display:flex;gap:0.5vw;flex-wrap:wrap;}
  .leg{display:flex;align-items:center;gap:0.35vw;font-size:0.7vw;color:var(--txt-doux);}
  .leg-c{width:0.78vw;height:0.78vw;border-radius:3px;}
  .source{font-size:0.7vw;color:var(--txt-doux);}
  .chargement{font-size:1vw;color:var(--txt-doux);padding:3vh;}
  .erreur{font-size:1vw;color:#ff9b9b;padding:3vh;}
</style>
</head>
<body>
  <div class="page">
    <header>
      <div>
        <h1>Qualité de l'<span>air</span></h1>
        <div class="lieu">Rousset (13087) — indice ATMO officiel</div>
      </div>
      <div style="text-align:right">
        <div class="maj" id="maj">Chargement…</div>
        <div class="meteo-tag" id="meteo-tag"></div>
      </div>
    </header>

    <div class="corps">
      <div class="jauge-bloc" id="jauge-bloc">
        <div class="chargement">Chargement…</div>
      </div>
      <div class="droite" id="droite">
        <div class="chargement">Chargement des détails AtmoSud…</div>
      </div>
    </div>

    <footer>
      <div class="legende" id="legende"></div>
      <div class="source">Source : AtmoSud + Open-Meteo · maj auto 30 min</div>
    </footer>
  </div>

<script>
  const TOKEN="bcfe08c69ccc3507bb36f3ce76dafcef";
  const INSEE="13087";
  const LAT=43.4435, LON=5.6149;

  const ECHELLE=[
    {n:"Bon",c:"#50F0E6"},{n:"Moyen",c:"#50CCAA"},{n:"Dégradé",c:"#F0E641"},
    {n:"Mauvais",c:"#FF5050"},{n:"Très mauvais",c:"#960032"},{n:"Extrêmement mauvais",c:"#7D2181"}
  ];
  const POLS=[
    {k:"pm2.5",nom:"PM2.5",oms:"OMS 24h : 15 µg/m³"},
    {k:"pm10",nom:"PM10",oms:"OMS 24h : 45 µg/m³"},
    {k:"o3",nom:"O₃",oms:"OMS 8h : 100 µg/m³"},
    {k:"no2",nom:"NO₂",oms:"OMS 24h : 25 µg/m³"},
    {k:"so2",nom:"SO₂",oms:"OMS 24h : 40 µg/m³"}
  ];

  function choixDuJour(liste, decalage){
    const j=Math.floor(Date.now()/86400000)+(decalage||0);
    return liste[j % liste.length];
  }

  // Verdict course : coche verte si OK, point d'exclamation sinon
  function verdictCourse(niveau, temp, pluie, vent){
    let probleme=[]; let gravite=0;
    if(niveau>=4){gravite=2;probleme.push("air mauvais");}
    else if(niveau===3){gravite=Math.max(gravite,1);probleme.push("air dégradé");}
    if(temp>=33){gravite=2;probleme.push("forte chaleur ("+Math.round(temp)+"°C)");}
    else if(temp>=29){gravite=Math.max(gravite,1);probleme.push("chaleur ("+Math.round(temp)+"°C)");}
    else if(temp<=2){gravite=Math.max(gravite,1);probleme.push("froid ("+Math.round(temp)+"°C)");}
    if(pluie>=3){gravite=Math.max(gravite,1);probleme.push("pluie");}
    if(vent>=40){gravite=Math.max(gravite,1);probleme.push("vent fort");}

    if(gravite===0){
      return {ico:"✓", txt:"Idéal pour courir",
        det:"Air de bonne qualité, météo favorable ("+Math.round(temp)+"°C).",
        couleur:"#50F0E6"};
    } else if(gravite===1){
      return {ico:"!", txt:"Course possible avec prudence",
        det:"À surveiller : "+probleme.join(", ")+". Adaptez l'intensité et l'horaire.",
        couleur:"#F0E641"};
    } else {
      return {ico:"!", txt:"Course déconseillée",
        det:"Conditions défavorables : "+probleme.join(", ")+". Préférez l'intérieur.",
        couleur:"#FF5050"};
    }
  }

  function conseils(niveau, temp, pluie, vent, majoritaire){
    const mois=new Date().getMonth()+1;
    const ete=(mois>=5&&mois<=9), hiver=(mois<=3||mois>=11);
    const dom=(majoritaire&&majoritaire[0])?majoritaire[0].toLowerCase():"";
    const ozone=dom.includes("o3"), particules=dom.includes("pm");

    let activite;
    if(niveau>=4) activite=choixDuJour(["Reportez le sport intense en extérieur ; préférez une activité douce ou en intérieur.","Évitez les efforts prolongés dehors aujourd'hui."]);
    else if(ozone&&ete) activite="Pic d'ozone l'après-midi : faites votre sport tôt le matin ou en soirée, à l'ombre.";
    else if(niveau===3) activite="Privilégiez les parcs, les zones piétonnes et les rues peu circulantes pour vos activités de plein air.";
    else activite=choixDuJour(["Conditions favorables : profitez des parcs et espaces verts pour vos activités de plein air.","Bon moment pour bouger dehors : marche, course ou vélo dans les zones vertes."]);

    let sensibles;
    if(niveau>=4) sensibles="Personnes sensibles : limitez les sorties et consultez un professionnel en cas de gêne.";
    else if(particules&&hiver) sensibles="Particules fines élevées : évitez les abords des routes et le chauffage au bois.";
    else if(niveau>=3) sensibles="N'aggravez pas les effets de la pollution en ajoutant des facteurs irritants (tabac, solvants, fumée de cheminée, pollens, etc.).";
    else sensibles="Aucune précaution particulière, mais évitez les facteurs irritants (tabac, fumée, solvants).";

    let deplacements;
    if(niveau>=3) deplacements=choixDuJour(["Privilégiez les transports en commun, le covoiturage ou le vélo.","À vélo, placez-vous devant les voitures au feu rouge et gardez vos distances derrière un véhicule motorisé."]);
    else deplacements=choixDuJour(["Pour les trajets courts, préférez la marche ou le vélo.","À vélo, placez-vous devant les voitures au feu rouge et gardez vos distances derrière un véhicule motorisé."]);

    let airint;
    if(pluie>=3) airint="La pluie assainit l'air extérieur : c'est le moment d'aérer largement.";
    else if(niveau>=4) airint="Aérez brièvement aux heures les moins polluées (tôt le matin).";
    else if(hiver) airint="Aérez 10 min matin et soir : l'air intérieur est souvent plus pollué que l'extérieur.";
    else airint="L'aération et la ventilation sont les moyens les plus efficaces d'améliorer votre air intérieur.";

    let pool=[
      "Utilisez des produits ménagers labellisés (Ecocert, NF Environnement, Ecolabel) et sans symbole de danger.",
      "Choisissez peintures, colles et meubles étiquetés A+ pour limiter les polluants intérieurs.",
      "Limitez bougies parfumées et encens, sources de particules fines à l'intérieur."
    ];
    if(ete&&ozone) pool=pool.concat(["Ozone : limitez la voiture aux heures chaudes.","Faites le plein de carburant le soir : moins d'évaporation, moins d'ozone.","Tondez la pelouse en soirée plutôt qu'en pleine chaleur."]);
    if(hiver&&particules) pool=pool.concat(["Chauffage au bois : appareil performant (Flamme Verte) et bois bien sec.","Pas de brûlage de déchets verts : interdit et très émetteur de particules.","Chauffage à 19°C : bon pour l'air, la santé et la facture."]);
    if(temp>=32) pool=pool.concat(["Forte chaleur : hydratez-vous, restez au frais, fermez les volets le jour.","Canicule et ozone vont souvent ensemble : efforts à la fraîche."]);
    if(temp<=3) pool=pool.concat(["Grand froid : ne faites pas tourner le moteur à l'arrêt.","Limitez les feux de cheminée d'agrément, très émetteurs de particules."]);
    pool=pool.concat(["Privilégiez le covoiturage ou les transports en commun pour le travail.","Entretenez régulièrement chaudière et appareils de combustion.","Préservez la végétation : elle capte une partie des polluants."]);
    const conseilJour=choixDuJour(pool, niveau);

    return [
      {i:"🏃",t:"Activité physique",p:activite},
      {i:"🫁",t:"Personnes sensibles",p:sensibles},
      {i:"🚲",t:"Déplacements",p:deplacements},
      {i:"🏠",t:"Air intérieur",p:airint},
      {i:"💡",t:"Conseil du jour",p:conseilJour}
    ];
  }

  function jour(s){const d=new Date(s+"T12:00:00");
    return d.toLocaleDateString("fr-FR",{weekday:"short",day:"2-digit",month:"short"});}
  function troisDates(){const o=[];for(let i=0;i<3;i++){const d=new Date();
    d.setDate(d.getDate()+i);o.push(d.toISOString().slice(0,10));}return o.join(",");}

  function demiJauge(niveau){
    const cx=100,cy=100,r=80;let segs="";
    for(let i=0;i<6;i++){
      const a0=180-i*30,a1=180-(i+1)*30;
      const r0=a0*Math.PI/180,r1=a1*Math.PI/180;
      const x0=cx+r*Math.cos(r0),y0=cy-r*Math.sin(r0);
      const x1=cx+r*Math.cos(r1),y1=cy-r*Math.sin(r1);
      segs+=`<path d="M ${x0} ${y0} A ${r} ${r} 0 0 1 ${x1} ${y1}" fill="none" stroke="${ECHELLE[i].c}" stroke-width="18"/>`;
    }
    const angle=180-(niveau-0.5)*30, rad=angle*Math.PI/180;
    const ax=cx+(r-8)*Math.cos(rad), ay=cy-(r-8)*Math.sin(rad);
    return `<svg viewBox="0 0 200 118">${segs}
      <line x1="${cx}" y1="${cy}" x2="${ax}" y2="${ay}" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="7" fill="#fff"/></svg>`;
  }

  async function getMeteo(){
    try{
      const u="https://api.open-meteo.com/v1/forecast?latitude="+LAT+"&longitude="+LON
        +"&current=temperature_2m,precipitation,wind_speed_10m&timezone=Europe%2FParis";
      const r=await fetch(u);const d=await r.json();
      return {temp:d.current.temperature_2m,pluie:d.current.precipitation,vent:d.current.wind_speed_10m};
    }catch(e){return {temp:20,pluie:0,vent:0};}
  }

  async function getBulletin(){
    try{
      const today=troisDates().split(",")[0];
      const r=await fetch("https://api.atmosud.org/prevision/commentaires/?dates_echeance="+today+"&token="+TOKEN);
      const d=await r.json();
      if(d&&d[today]) return d[today];
    }catch(e){}
    return "";
  }

  async function charger(){
    const jbloc=document.getElementById("jauge-bloc");
    const droite=document.getElementById("droite");
    try{
      const url="https://api.atmosud.org/iqa2021/commune/indices/journalier"
        +"?insee="+INSEE+"&indice=all&format_indice=valeur,qualificatif,couleur"
        +"&dates_echeances="+troisDates()+"&token="+TOKEN;
      const [r,meteo,bulletin]=await Promise.all([fetch(url),getMeteo(),getBulletin()]);
      const data=await r.json();
      const bloc=data[INSEE];if(!bloc||!bloc.valeurs)throw new Error("vide");
      const dates=Object.keys(bloc.valeurs).sort();
      const auj=bloc.valeurs[dates[0]];
      const ind=auj.indice;const niveau=ind.valeur;

      document.getElementById("meteo-tag").textContent=
        "🌡️ "+Math.round(meteo.temp)+"°C"+(meteo.pluie>=0.2?" · 🌧️ pluie":"");

      let tendanceHtml="";
      if(dates[1]&&bloc.valeurs[dates[1]]){
        const dem=bloc.valeurs[dates[1]].indice;
        tendanceHtml=`<div class="tendance">Tendance demain : <b>${dem.qualificatif}</b></div>`;
      }

      const vc=verdictCourse(niveau,meteo.temp,meteo.pluie,meteo.vent);

      jbloc.innerHTML=`
        <div class="jauge">${demiJauge(niveau)}</div>
        <div class="jauge-qualif" style="color:${ind.couleur}">${ind.qualificatif}</div>
        <div class="jauge-sous">Indice ATMO ${ind.valeur}/6</div>
        ${tendanceHtml}
        <div class="course" style="--cc:${vc.couleur}">
          <div class="course-ico">${vc.ico}</div>
          <div><div class="course-txt">${vc.txt}</div>
          <div class="course-det">${vc.det}</div></div>
        </div>`;

      let polsHtml="";
      POLS.forEach(p=>{const v=auj[p.k];if(v){
        polsHtml+=`<div class="pol" style="--c:${v.couleur}">
          <div class="pol-nom">${p.nom}</div>
          <div class="pol-qual">${v.qualificatif}</div>
          <div class="pol-oms">${p.oms}</div></div>`;}});

      let prevHtml="";
      dates.slice(1,3).forEach(dt=>{const pv=bloc.valeurs[dt].indice;
        prevHtml+=`<div class="prev-jour">
          <div class="prev-pastille" style="background:${pv.couleur}"></div>
          <div class="prev-info"><div class="d">${jour(dt)}</div><div>${pv.qualificatif}</div></div>
        </div>`;});

      let consHtml="";
      conseils(niveau,meteo.temp,meteo.pluie,meteo.vent,auj.majoritaire).forEach(c=>{
        consHtml+=`<div class="conseil">
          <div class="conseil-ico">${c.i}</div>
          <div class="conseil-txt"><h4>${c.t}</h4><p>${c.p}</p></div></div>`;});

      const bulletinHtml = bulletin
        ? `<div><div class="sous-titre">Bulletin du jour</div><div class="bulletin">${bulletin}</div></div>`
        : "";

      droite.innerHTML=`
        <div><div class="sous-titre">Détail par polluant</div>
          <div class="polluants">${polsHtml}</div></div>
        <div><div class="sous-titre">Prévisions</div>
          <div class="prev">${prevHtml}</div></div>
        <div><div class="sous-titre">Recommandations</div>
          <div class="conseils">${consHtml}</div></div>
        ${bulletinHtml}`;

      document.getElementById("legende").innerHTML=
        ECHELLE.map(e=>`<div class="leg"><div class="leg-c" style="background:${e.c}"></div>${e.n}</div>`).join("");
      document.getElementById("maj").textContent=
        "Diffusé le "+new Date(auj.date_diffusion).toLocaleDateString("fr-FR");
    }catch(e){
      jbloc.innerHTML='<div class="erreur">Indisponible.</div>';
      droite.innerHTML='<div class="erreur">Détails indisponibles. Nouvel essai dans 30 min.</div>';
    }
  }
  charger();
  setInterval(charger,30*60*1000);
</script>
</body>
</html>
