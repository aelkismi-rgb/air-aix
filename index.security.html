<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenue sur le site de Rousset - Safety First</title>

<style>
  /* ===== POLICES EN LOCAL (aucune connexion Internet requise) ===== */
  @font-face {
    font-family: 'Roboto';
    src: url('assets/Roboto-Regular.woff2') format('woff2');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Roboto';
    src: url('assets/Roboto-Medium.woff2') format('woff2');
    font-weight: 500; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Roboto';
    src: url('assets/Roboto-Bold.woff2') format('woff2');
    font-weight: 700; font-style: normal; font-display: swap;
  }
  /* Police LED Dot-Matrix pour les compteurs */
  @font-face {
    font-family: 'LEDDotMatrix';
    src: url('assets/DSEG14Classic-Bold.woff2') format('woff2');
    font-weight: normal; font-style: normal; font-display: swap;
  }

  :root {
    --bleu-garmin: #2ba3d4;
    --bleu-fonce: #1b5e8a;
    --gris-fond: #d9d9d9;
    --gris-ligne: #ededed;
    --noir: #000;
    --led-rouge: #ff2a2a;
    --led-fond: #060606;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Roboto', Arial, sans-serif;
    background: #fff;
    color: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .page {
    width: 100vw;
    height: 100vh;
    max-width: 177.78vh;
    max-height: 56.25vw;
    margin: auto;
    background: #fff;
    display: grid;
    grid-template-columns: 27% 1fr;
    grid-template-rows: 14% 1fr;
    column-gap: 1.5vw;
    padding: 2.2vh 2vw;
  }

  /* ===== EN-TÊTE ===== */
  .header {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    align-items: center;
    gap: 1vw;
  }
  .header h1 {
    font-family: 'Roboto', sans-serif;
    font-size: 3.1vw;
    font-weight: 700;
    border-bottom: 0.55vh solid var(--bleu-garmin);
    padding-bottom: 0.5vh;
    flex: 1;
    line-height: 1.05;
    white-space: nowrap;
  }
  .header .bars { display: flex; gap: 0.45vw; align-self: flex-start; margin-top: 0.3vh; }
  .header .bars span {
    width: 1vw; height: 5.5vh;
    background: var(--bleu-garmin);
    transform: skewX(-12deg);
  }

  /* ===== COLONNE GAUCHE ===== */
  .sidebar {
    grid-column: 1;
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 0.5vh 0 0.5vh;
  }
  .garmin-logo { width: 78%; height: auto; object-fit: contain; }
  .safety-first { width: 100%; max-height: 46vh; object-fit: contain; }
  .ppe-icons { display: flex; gap: 1vw; }
  .ppe-icons img { width: 4.6vw; max-width: 8vh; height: auto; }
  .protege {
    font-family: 'Roboto', sans-serif;
    font-weight: 700;
    font-size: 1.15vw;
    text-align: center;
  }

  /* ===== ZONE PRINCIPALE ===== */
  .main {
    grid-column: 2;
    grid-row: 2;
    display: flex;
    flex-direction: column;
    gap: 1.4vh;
    min-height: 0;
    padding-top: 1vh;
  }

  .week-band {
    background: var(--noir);
    color: var(--bleu-garmin);
    font-family: 'Roboto', sans-serif;
    font-weight: 700;
    font-size: 1.6vw;
    padding: 0.7vh 1vw;
  }
  .days-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .days-table th {
    background: var(--gris-fond);
    border: 2px solid #fff;
    font-family: 'Roboto', sans-serif;
    font-size: 1.55vw;
    padding: 0.8vh 0;
    font-weight: 400;
  }
  .days-table td {
    background: var(--gris-ligne);
    border: 2px solid #fff;
    height: 9vh;
    text-align: center;
    vertical-align: middle;
  }
  .days-table td img { height: 6.5vh; width: auto; vertical-align: middle; }

  .indicators {
    background: var(--gris-fond);
    border-radius: 1vh;
    padding: 2vh 2.2vw;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    min-height: 0;
  }
  .indicator-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5vw;
  }
  .indicator-row .label {
    font-family: 'Roboto', sans-serif;
    font-weight: 700;
    font-size: 1.75vw;
    flex: 1;
  }

  /* ===== AFFICHEUR LED DOT-MATRIX ===== */
  .led-display {
    background: radial-gradient(circle at 35% 25%, #161616, var(--led-fond));
    border-radius: 0.8vh;
    padding: 1.1vh 1.3vw;
    min-width: 14vw;
    text-align: center;
    box-shadow: inset 0 0 1.6vh rgba(0,0,0,.95), 0 0.3vh 0.6vh rgba(0,0,0,.3);
  }
  .led-text {
    font-family: 'LEDDotMatrix', 'Courier New', monospace;
    font-weight: 700;
    font-size: 4.6vw;
    letter-spacing: 0.3vw;
    color: var(--led-rouge);
    /* halo lumineux flou autour des LED */
    text-shadow:
      0 0 0.4vw rgba(255,70,70,.95),
      0 0 1vw  rgba(255,30,30,.85),
      0 0 2vw  rgba(255,0,0,.6),
      0 0 3.4vw rgba(255,0,0,.4);
  }
  /* "segments éteints" en fond pour l'effet matrice (lettres fantômes) */
  .led-display { position: relative; }
  .led-text .ghost {
    position: absolute;
    inset: 1.1vh 1.3vw;
    color: rgba(255,42,42,.10);
    text-shadow: none;
    z-index: 0;
    pointer-events: none;
  }

  @media (max-width: 760px) {
    html, body { overflow: auto; }
    .page { grid-template-columns: 1fr; grid-template-rows: auto auto auto; height:auto; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- ===== COLONNE GAUCHE ===== -->
  <aside class="sidebar">
    <img class="garmin-logo" src="assets/garmin.png" alt="Garmin">
    <img class="safety-first" src="assets/safety_first.png" alt="Safety First">
    <div class="ppe-icons">
      <img src="assets/ppe_coverall.png" alt="Combinaison">
      <img src="assets/ppe_gloves.png" alt="Gants">
      <img src="assets/ppe_boots.png" alt="Chaussures">
      <img src="assets/ppe_glasses.png" alt="Lunettes">
    </div>
    <div class="protege">Ils vous prot&egrave;gent, Ne les oubliez pas</div>
  </aside>

  <!-- ===== EN-TÊTE ===== -->
  <header class="header">
    <h1>Bienvenue sur le site de Rousset</h1>
    <div class="bars"><span></span><span></span></div>
  </header>

  <!-- ===== ZONE PRINCIPALE ===== -->
  <main class="main">
    <div class="week-band" id="dateBand">&mdash;</div>

    <table class="days-table">
      <thead>
        <tr><th>Lundi</th><th>Mardi</th><th>Mercredi</th><th>Jeudi</th><th>Vendredi</th></tr>
      </thead>
      <tbody>
        <tr id="smileyRow"><td></td><td></td><td></td><td></td><td></td></tr>
      </tbody>
    </table>

    <div class="indicators">
      <div class="indicator-row">
        <div class="label">Nombre de jours sans accident</div>
        <div class="led-display"><span class="led-text" id="ledJours">000</span></div>
      </div>
      <div class="indicator-row">
        <div class="label">RSD &amp; Presqu'accidents remont&eacute;s</div>
        <div class="led-display"><span class="led-text" id="ledRSD">000</span></div>
      </div>
      <div class="indicator-row">
        <div class="label">Participation</div>
        <div class="led-display"><span class="led-text" id="ledPart">00%</span></div>
      </div>
    </div>
  </main>

</div>

<script>
/* =================================================================== */
/* ============  ZONE DE CONFIGURATION — À MODIFIER ICI  ============== */
/* =================================================================== */

const CONFIG = {

  /* --- 1. Date de DÉPART du compteur "jours sans accident" --- */
  DATE_DEPART: { annee: 2026, mois: 6, jour: 5 },

  /* --- 3. Valeur de départ du compteur (on démarre à 35) --- */
  JOURS_DEPART: 35,

  /* --- 4. RSD & Presqu'accidents remontés (modifier le chiffre) --- */
  RSD: 2,

  /* --- 5. Participation en % (modifier le chiffre) --- */
  PARTICIPATION: 10,

  /* --- 2. Smileys de la semaine ---
     "auto"   -> vert automatiquement quand le jour est passé/en cours
     "vert"   -> vert (journée OK)
     "orange" -> presqu'accident
     "rouge"  -> accident
     ""       -> case vide (jour futur) */
  SMILEYS: {
    lundi:    "auto",
    mardi:    "auto",
    mercredi: "auto",
    jeudi:    "auto",
    vendredi: "auto"
  },

  /* --- Jours fériés à NE PAS compter (+ week-ends) --- */
  JOURS_FERIES: [
    "2026-01-01", "2026-04-06", "2026-05-01", "2026-05-08",
    "2026-05-14", "2026-05-25", "2026-07-14", "2026-08-15",
    "2026-11-01", "2026-11-11", "2026-12-25"
  ]
};

/* =================================================================== */
/* ============  LOGIQUE — pas besoin de modifier en dessous  ========= */
/* =================================================================== */

const MOIS_FR = ["janvier","février","mars","avril","mai","juin","juillet",
                 "août","septembre","octobre","novembre","décembre"];
const JOURS_FR = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const SMILEY_IMG = {
  vert:   "assets/smiley_vert.png",
  orange: "assets/smiley_orange.png",
  rouge:  "assets/smiley_rouge.png"
};

function pad3(n){ return String(n).padStart(3,"0"); }
function ymd(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function estJourTravaille(d){
  const j = d.getDay();
  if (j === 0 || j === 6) return false;
  if (CONFIG.JOURS_FERIES.includes(ymd(d))) return false;
  return true;
}

function afficherDate(){
  const now = new Date();
  document.getElementById("dateBand").textContent =
    JOURS_FR[now.getDay()].toUpperCase() + " " + now.getDate() + " " +
    MOIS_FR[now.getMonth()].toUpperCase() + " " + now.getFullYear();
}

function calculerJoursSansAccident(){
  const depart = new Date(CONFIG.DATE_DEPART.annee, CONFIG.DATE_DEPART.mois-1, CONFIG.DATE_DEPART.jour);
  const now = new Date();
  now.setHours(0,0,0,0); depart.setHours(0,0,0,0);
  let count = 0, c = new Date(depart);
  c.setDate(c.getDate()+1);
  while (c <= now){ if (estJourTravaille(c)) count++; c.setDate(c.getDate()+1); }
  return CONFIG.JOURS_DEPART + count;
}

function afficherSmileys(){
  const ordre = ["lundi","mardi","mercredi","jeudi","vendredi"];
  const auj = new Date().getDay();
  const cells = document.querySelectorAll("#smileyRow td");
  ordre.forEach((jour, i) => {
    let val = CONFIG.SMILEYS[jour];
    if (val === "auto") val = ((i+1) <= auj) ? "vert" : "";
    cells[i].innerHTML = (val === "") ? "" : '<img src="'+SMILEY_IMG[val]+'" alt="'+val+'">';
  });
}

function afficherIndicateurs(){
  document.getElementById("ledJours").textContent = pad3(calculerJoursSansAccident());
  document.getElementById("ledRSD").textContent   = pad3(CONFIG.RSD);
  document.getElementById("ledPart").textContent  = String(CONFIG.PARTICIPATION).padStart(2,"0") + "%";
}

afficherDate();
afficherSmileys();
afficherIndicateurs();
</script>

</body>
</html>
