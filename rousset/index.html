<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bienvenue sur le site de Rousset - Safety First</title>
<style>
  /* ===== POLICES EN LOCAL (aucune connexion Internet requise) ===== */
  @font-face{font-family:'Roboto';src:url('assets/Roboto-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
  @font-face{font-family:'Roboto';src:url('assets/Roboto-Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap;}
  @font-face{font-family:'Roboto';src:url('assets/Roboto-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap;}
  @font-face{font-family:'LEDDotMatrix';src:url('assets/LED_Dot-Matrix.woff2') format('woff2');font-weight:normal;font-style:normal;font-display:swap;}

  :root{
    --bleu-garmin:#2ba3d4;
    --bleu-clair:#5ec2e8;
    --bleu-fonce:#0f4c6b;
    --gris-fond:#eef1f4;
    --gris-carte:#f7f9fb;
    --gris-ligne:#e4e9ef;
    --noir:#0c1116;
    --led-rouge:#ff3b3b;
    --led-fond:#070a0c;
    --texte:#16202b;
  }

  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}

  body{
    font-family:'Roboto',sans-serif;
    color:var(--texte);
    /* fond atmosphérique moderne */
    background:
      radial-gradient(1200px 600px at 85% -10%, rgba(43,163,212,.16), transparent 60%),
      radial-gradient(900px 500px at -5% 110%, rgba(15,76,107,.12), transparent 55%),
      linear-gradient(135deg,#ffffff 0%,#eef3f7 100%);
    display:flex;align-items:center;justify-content:center;
  }

  .page{
    position:relative;
    width:100vw;height:100vh;
    max-width:177.78vh;max-height:56.25vw;
    margin:auto;
    display:grid;
    grid-template-columns:26% 1fr;
    grid-template-rows:14% 1fr;
    column-gap:1.8vw;
    padding:3vh 2.4vw;
  }

  /* ===== EN-TÊTE ===== */
  .header{
    grid-column:2;grid-row:1;
    display:flex;align-items:center;gap:1vw;
    animation:fadeDown .7s ease both;
  }
  .header h1{
    font-size:3vw;font-weight:700;letter-spacing:-.01em;
    color:var(--bleu-fonce);
    flex:1;line-height:1.04;white-space:nowrap;
    position:relative;padding-bottom:1vh;
  }
  .header h1::after{
    content:"";position:absolute;left:0;bottom:0;
    width:100%;height:.55vh;border-radius:2px;
    background:linear-gradient(90deg,var(--bleu-garmin),var(--bleu-clair));
  }
  .header .bars{display:flex;gap:.45vw;align-self:flex-start;margin-top:.4vh;}
  .header .bars span{
    width:1vw;height:5.2vh;border-radius:2px;
    background:linear-gradient(180deg,var(--bleu-clair),var(--bleu-garmin));
    transform:skewX(-12deg);
    box-shadow:0 .4vh 1vh rgba(43,163,212,.35);
  }

  /* ===== COLONNE GAUCHE ===== */
  .sidebar{
    grid-column:1;grid-row:1 / 3;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:.5vh 0;
    animation:fadeRight .8s ease both;
  }
  .garmin-logo{width:74%;height:auto;object-fit:contain;}

  .safety-wrap{
    position:relative;width:100%;display:flex;justify-content:center;
  }
  .safety-wrap::before{
    content:"";position:absolute;top:50%;left:50%;
    width:88%;aspect-ratio:1;transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle,rgba(43,163,212,.22),transparent 68%);
    filter:blur(6px);z-index:0;
  }
  .safety-first{
    position:relative;z-index:1;
    width:100%;max-height:42vh;object-fit:contain;
    filter:drop-shadow(0 1.6vh 2.6vh rgba(15,76,107,.28));
  }

  .ppe-icons{display:flex;gap:1vw;}
  .ppe-icons img{
    width:4.4vw;max-width:7.6vh;height:auto;
    border-radius:50%;
    box-shadow:0 .6vh 1.4vh rgba(15,76,107,.22);
    transition:transform .25s ease;
  }
  .ppe-icons img:hover{transform:translateY(-.6vh) scale(1.05);}

  .protege{
    font-weight:700;font-size:1.1vw;text-align:center;
    color:var(--bleu-fonce);letter-spacing:.01em;
  }

  /* ===== ZONE PRINCIPALE ===== */
  .main{
    grid-column:2;grid-row:2;
    display:flex;flex-direction:column;gap:1.6vh;
    min-height:0;padding-top:1vh;
    animation:fadeUp .8s ease both .1s;
  }

  /* bandeau date */
  .week-band{
    background:linear-gradient(90deg,var(--noir),#1a2530);
    color:var(--bleu-clair);
    font-weight:700;font-size:1.5vw;letter-spacing:.06em;
    padding:.9vh 1.2vw;border-radius:1vh;
    box-shadow:0 .6vh 1.4vh rgba(12,17,22,.22);
    display:flex;align-items:center;gap:.7vw;
  }
  .week-band::before{
    content:"";width:.8vw;height:.8vw;border-radius:50%;
    background:var(--bleu-clair);
    box-shadow:0 0 1vw var(--bleu-clair);
    animation:pulse 2s infinite;
  }

  /* tableau jours - cartes modernes */
  .days-table{width:100%;border-collapse:separate;border-spacing:.5vw 0;table-layout:fixed;}
  .days-table th{
    font-size:1.45vw;font-weight:500;padding:.7vh 0 1vh;
    color:var(--bleu-fonce);text-transform:uppercase;letter-spacing:.04em;
  }
  .days-table td{
    background:var(--gris-carte);
    border:1px solid var(--gris-ligne);
    border-radius:1.2vh;
    height:9vh;text-align:center;vertical-align:middle;
    box-shadow:inset 0 .2vh .6vh rgba(255,255,255,.7),0 .5vh 1.2vh rgba(15,76,107,.08);
  }
  .days-table td img{height:6.4vh;width:auto;vertical-align:middle;filter:drop-shadow(0 .4vh .8vh rgba(0,0,0,.18));}

  /* bloc indicateurs */
  .indicators{
    background:linear-gradient(160deg,var(--gris-carte),var(--gris-fond));
    border:1px solid var(--gris-ligne);
    border-radius:1.8vh;
    padding:2.2vh 2.4vw;flex:1;min-height:0;
    display:flex;flex-direction:column;justify-content:space-around;
    box-shadow:0 1.4vh 3vh rgba(15,76,107,.10),inset 0 .2vh .6vh rgba(255,255,255,.7);
  }
  .indicator-row{display:flex;align-items:center;justify-content:space-between;gap:1.5vw;}
  .indicator-row .label{
    font-weight:700;font-size:1.65vw;flex:1;color:var(--texte);letter-spacing:-.005em;
  }

  /* ===== AFFICHEUR LED ===== */
  .led-display{
    position:relative;
    background:
      radial-gradient(120% 140% at 30% 10%, #19222b 0%, var(--led-fond) 70%);
    border-radius:1.1vh;
    padding:1.2vh 1.5vw;min-width:14.5vw;text-align:center;
    border:1px solid #000;
    box-shadow:
      inset 0 0 2vh rgba(0,0,0,.95),
      inset 0 .3vh .4vh rgba(255,255,255,.05),
      0 .8vh 1.8vh rgba(0,0,0,.35);
    overflow:hidden;
  }
  /* reflet vitre en haut de l'écran */
  .led-display::after{
    content:"";position:absolute;top:0;left:0;right:0;height:42%;
    background:linear-gradient(180deg,rgba(255,255,255,.07),transparent);
    pointer-events:none;
  }
  .led-text{
    position:relative;z-index:1;
    font-family:'LEDDotMatrix','Courier New',monospace;
    font-size:4.6vw;letter-spacing:.18vw;
    color:var(--led-rouge);
    text-shadow:
      0 0 .35vw rgba(255,90,90,.95),
      0 0 1vw rgba(255,40,40,.85),
      0 0 2.2vw rgba(255,0,0,.6),
      0 0 3.6vw rgba(255,0,0,.4);
  }

  /* ===== ANIMATIONS ===== */
  @keyframes fadeDown{from{opacity:0;transform:translateY(-1.4vh)}to{opacity:1;transform:none}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(1.8vh)}to{opacity:1;transform:none}}
  @keyframes fadeRight{from{opacity:0;transform:translateX(-1.6vw)}to{opacity:1;transform:none}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

  @media (max-width:760px){
    html,body{overflow:auto;}
    .page{grid-template-columns:1fr;grid-template-rows:auto auto auto;height:auto;}
  }
</style>
</head>
<body>

<div class="page">

  <aside class="sidebar">
    <img class="garmin-logo" src="assets/garmin.png" alt="Garmin">
    <div class="safety-wrap">
      <img class="safety-first" src="assets/safety_first.svg" alt="Safety First">
    </div>
    <div class="ppe-icons">
      <img src="assets/ppe_coverall.png" alt="Combinaison">
      <img src="assets/ppe_gloves.png" alt="Gants">
      <img src="assets/ppe_boots.png" alt="Chaussures">
      <img src="assets/ppe_glasses.png" alt="Lunettes">
    </div>
    <div class="protege">Ils vous prot&egrave;gent, Ne les oubliez pas</div>
  </aside>

  <header class="header">
    <h1>Bienvenue sur le site de Rousset</h1>
    <div class="bars"><span></span><span></span></div>
  </header>

  <main class="main">
    <div class="week-band" id="dateBand">&mdash;</div>

    <table class="days-table">
      <thead>
        <tr><th>Lundi</th><th>Mardi</th><th>Mercredi</th><th>Jeudi</th><th>Vendredi</th></tr>
      </thead>
      <tbody>
        <tr id="smileyRow"><td></td><td></td><td></td><td></td><td></td></tr>
      </tbody>
    </table>

    <div class="indicators">
      <div class="indicator-row">
        <div class="label">Nombre de jours sans accident</div>
        <div class="led-display"><span class="led-text" id="ledJours">000</span></div>
      </div>
      <div class="indicator-row">
        <div class="label">RSD &amp; Presqu'accidents remont&eacute;s</div>
        <div class="led-display"><span class="led-text" id="ledRSD">000</span></div>
      </div>
      <div class="indicator-row">
        <div class="label">Participation</div>
        <div class="led-display"><span class="led-text" id="ledPart">00%</span></div>
      </div>
    </div>
  </main>

</div>

<script>
/* =================================================================== */
/* ============  ZONE DE CONFIGURATION — À MODIFIER ICI  ============== */
/* =================================================================== */

const CONFIG = {

  /* --- 1. Date de DÉPART du compteur "jours sans accident" --- */
  DATE_DEPART: { annee: 2026, mois: 6, jour: 18 },

  /* --- 3. Valeur de départ du compteur (on démarre à 35) --- */
  JOURS_DEPART: 0,

  /* --- 4. RSD & Presqu'accidents remontés (modifier le chiffre) --- */
  RSD: 0,

  /* --- 5. Participation en % (modifier le chiffre) --- */
  PARTICIPATION: 0,

  /* --- 2. Smileys de la semaine ---
     "auto"   -> vert automatiquement quand le jour est passé/en cours
     "vert"   -> vert (journée OK)
     "orange" -> presqu'accident
     "rouge"  -> accident
     ""       -> case vide (jour futur) */
  SMILEYS: {
    lundi:    "auto",
    mardi:    "auto",
    mercredi: "auto",
    jeudi:    "auto",
    vendredi: "auto"
  },

  /* --- Jours fériés à NE PAS compter (+ week-ends) --- */
  JOURS_FERIES: [
    "2026-01-01", "2026-04-06", "2026-05-01", "2026-05-08",
    "2026-05-14", "2026-05-25", "2026-07-14", "2026-08-15",
    "2026-11-01", "2026-11-11", "2026-12-25"
  ]
};

/* =================================================================== */
/* ============  LOGIQUE — pas besoin de modifier en dessous  ========= */
/* =================================================================== */

const MOIS_FR = ["janvier","février","mars","avril","mai","juin","juillet",
                 "août","septembre","octobre","novembre","décembre"];
const JOURS_FR = ["dimanche","lundi","mardi","mercredi","jeudi","vendredi","samedi"];
const SMILEY_IMG = {
  vert:   "assets/smiley_vert.png",
  orange: "assets/smiley_orange.png",
  rouge:  "assets/smiley_rouge.png"
};

function pad3(n){ return String(n).padStart(3,"0"); }
function ymd(d){
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}
function estJourTravaille(d){
  const j = d.getDay();
  if (j === 0 || j === 6) return false;
  if (CONFIG.JOURS_FERIES.includes(ymd(d))) return false;
  return true;
}

function afficherDate(){
  const now = new Date();
  document.getElementById("dateBand").textContent =
    JOURS_FR[now.getDay()].toUpperCase() + " " + now.getDate() + " " +
    MOIS_FR[now.getMonth()].toUpperCase() + " " + now.getFullYear();
}

function calculerJoursSansAccident(){
  const depart = new Date(CONFIG.DATE_DEPART.annee, CONFIG.DATE_DEPART.mois-1, CONFIG.DATE_DEPART.jour);
  const now = new Date();
  now.setHours(0,0,0,0); depart.setHours(0,0,0,0);
  let count = 0, c = new Date(depart);
  c.setDate(c.getDate()+1);
  while (c <= now){ if (estJourTravaille(c)) count++; c.setDate(c.getDate()+1); }
  return CONFIG.JOURS_DEPART + count;
}

function afficherSmileys(){
  const ordre = ["lundi","mardi","mercredi","jeudi","vendredi"];
  const auj = new Date().getDay();
  const cells = document.querySelectorAll("#smileyRow td");
  ordre.forEach((jour, i) => {
    let val = CONFIG.SMILEYS[jour];
    if (val === "auto") val = ((i+1) <= auj) ? "vert" : "";
    cells[i].innerHTML = (val === "") ? "" : '<img src="'+SMILEY_IMG[val]+'" alt="'+val+'">';
  });
}

function afficherIndicateurs(){
  document.getElementById("ledJours").textContent = pad3(calculerJoursSansAccident());
  document.getElementById("ledRSD").textContent   = pad3(CONFIG.RSD);
  document.getElementById("ledPart").textContent  = String(CONFIG.PARTICIPATION).padStart(2,"0") + "%";
}

afficherDate();
afficherSmileys();
afficherIndicateurs();
</script>

</body>
</html>
